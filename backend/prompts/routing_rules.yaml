# RAG 라우팅 규칙 — 코드 수정 없이 룰 업데이트 가능
# 규칙은 위에서 아래로 순서대로 평가, 첫 매칭에서 중단

strategies:
  standard_rag:
    mode: rag
    use_hyde: false
    use_self_rag: false
    temperature: null  # use default
    top_k: 7           # 기본값 유지 (5는 검색누락 증가)
    max_tokens: null    # 기본값 사용 (256은 답변 잘림)
    description: "빠른 경로 — 단순 사실 질문"

  deep_retrieval:
    mode: rag
    use_hyde: true
    use_self_rag: true
    temperature: 0.3
    top_k: 15
    description: "정밀 경로 — 복잡/다문서 질문"

  direct_llm:
    mode: direct
    use_hyde: false
    use_self_rag: false
    temperature: 0.7
    top_k: 0
    description: "LLM 직접 — 인사/잡담"

rules:
  # 우선순위 순서 (위에서 아래로 평가)

  - name: "인사/잡담"
    strategy: direct_llm
    conditions:
      max_length: 20
      patterns:
        - "^(안녕|하이|ㅎㅇ|감사|고마워|수고|반갑|잘\\s*가|헬로|hello)"
    confidence: 0.95

  - name: "다문서 종합 (규정명 2개+)"
    strategy: deep_retrieval
    conditions:
      min_length: 15
      min_regulation_count: 2  # 규정명이 2개 이상 언급
    confidence: 0.85

  - name: "복잡 비교/분석"
    strategy: deep_retrieval
    conditions:
      min_length: 10
      patterns:
        - "(비교|대비|차이점|연계|함께\\s*적용|동시에)"
    confidence: 0.80

  - name: "기본 RAG"
    strategy: standard_rag
    conditions: {}  # catch-all
    confidence: 0.70
